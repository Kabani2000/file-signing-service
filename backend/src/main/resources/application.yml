spring:
  application:
    name: file-signing-service
  servlet:
    multipart:
      # Bound the upload on the hot path; reject early instead of buffering unbounded data.
      max-file-size: 25MB
      max-request-size: 25MB
      file-size-threshold: 1MB

server:
  port: 8080

signing:
  # Demo key material. NOT a secret — a self-signed EC P-256 key generated by
  # scripts/gen-demo-keystore.sh. In production this points at a KMS/HSM-backed key.
  keystore-location: classpath:demo/demo-keystore.p12
  keystore-password: demo-password
  key-alias: demo-signer
